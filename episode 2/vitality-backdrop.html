<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vitality backdrop — aurora · mountains · particles</title>

<!-- ===========================================================================
     VITALITY ATMOSPHERIC BACKDROP  (drop-in)
     Ported 1:1 from components/WelcomeBackdrop.tsx + WelcomeBackdrop.module.css.
     Aurora wash + distant mountains + drifting mint particles.

     HOW TO ADD IT TO ANOTHER DASHBOARD — copy these 3 pieces:
       1. The <style id="vty-backdrop-css"> block below  → into your <head>.
       2. The <div id="vty-backdrop"> ... </div> markup    → as the FIRST thing
          inside <body> (before your own content).
       3. The <script id="vty-backdrop-js"> block          → before </body>.

     REQUIREMENTS:
       • Your page background should be dark/black (the bottom of the aurora
         fades into near-black, rgba(4,6,10,.95)). Set: html,body{background:#000}
       • The 3 layers are position:fixed at z-index 0 / 1 / 2 and
         pointer-events:none. Put YOUR content above them with z-index:5+ (e.g.
         wrap it in a positioned element: position:relative; z-index:5).
       • Zero dependencies. No build step. Works in any plain HTML page.
     =========================================================================== -->

<style id="vty-backdrop-css">
  /* Layer 1 — aurora atmosphere (mint glow + faint warm core + dark vignette) */
  .vty-atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(60% 50% at 50% 30%, rgba(110, 231, 183, 0.16) 0%, rgba(110, 231, 183, 0.06) 32%, rgba(110, 231, 183, 0) 65%),
      radial-gradient(28% 22% at 50% 38%, rgba(255, 226, 181, 0.07) 0%, rgba(255, 226, 181, 0) 70%),
      radial-gradient(120% 80% at 50% 100%, rgba(14, 38, 30, 0.5) 0%, rgba(4, 6, 10, 0.95) 75%);
    background-repeat: no-repeat;
    background-size: 100% 100%;
  }

  /* Layer 2 — distant mountain silhouette pinned to the bottom */
  .vty-mountains {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
    height: 30vh;
    min-height: 180px;
    pointer-events: none;
    opacity: 0.8;
  }
  .vty-mountains svg { width: 100%; height: 100%; display: block; }

  /* Layer 3 — drifting mint particle field */
  .vty-particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .vty-particles span {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    background: rgba(233, 239, 233, 0.7);
    border-radius: 50%;
    animation: vty-backdrop-drift linear infinite;
    box-shadow: 0 0 6px rgba(167, 243, 208, 0.5);
  }
  @keyframes vty-backdrop-drift {
    0%   { transform: translate3d(0, 0, 0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.55; }
    100% { transform: translate3d(var(--dx, 12px), var(--dy, -100vh), 0); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .vty-particles span { animation: none; }
  }

  /* ---- demo-page chrome only (NOT part of the backdrop — delete on embed) ---- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .vty-demo-content {
    position: relative;
    z-index: 5;                 /* content sits ABOVE the backdrop layers */
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 24px;
  }
  .vty-demo-title {
    font-family: "Newsreader", Georgia, serif;
    font-style: italic;
    font-size: clamp(2rem, 6vw, 3.25rem);
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .vty-demo-sub {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>

<!-- ====== 2) BACKDROP MARKUP — paste as the first thing inside <body> ====== -->
<div id="vty-backdrop" aria-hidden="true">
  <div class="vty-atmosphere"></div>
  <div class="vty-mountains">
    <svg viewBox="0 0 1600 420" preserveAspectRatio="none">
      <defs>
        <linearGradient id="vty-mt-far" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d1a17" stop-opacity="0"></stop>
          <stop offset="55%" stop-color="#0d1a17" stop-opacity=".55"></stop>
          <stop offset="100%" stop-color="#0d1a17" stop-opacity=".95"></stop>
        </linearGradient>
        <linearGradient id="vty-mt-near" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#050a09" stop-opacity=".4"></stop>
          <stop offset="60%" stop-color="#050a09" stop-opacity=".95"></stop>
          <stop offset="100%" stop-color="#050a09" stop-opacity="1"></stop>
        </linearGradient>
      </defs>
      <path d="M0,300 L120,230 L210,260 L320,180 L430,220 L560,150 L680,210 L820,170 L960,220 L1100,180 L1240,240 L1380,200 L1500,250 L1600,220 L1600,420 L0,420 Z" fill="url(#vty-mt-far)"></path>
      <path d="M0,360 L100,320 L220,340 L340,290 L460,330 L590,300 L720,340 L860,310 L1000,350 L1140,310 L1280,355 L1420,320 L1540,360 L1600,340 L1600,420 L0,420 Z" fill="url(#vty-mt-near)"></path>
    </svg>
  </div>
  <div class="vty-particles" id="vty-particles"></div>
</div>

<!-- ====== your dashboard content goes here (z-index:5+) ====== -->
<main class="vty-demo-content">
  <div class="vty-demo-title">Vitality backdrop</div>
  <div class="vty-demo-sub">aurora · mountains · drifting particles</div>
</main>

<!-- ====== 3) PARTICLE SPAWNER — paste before </body> ====== -->
<script id="vty-backdrop-js">
(function () {
  // Drifting mint particle field — identical recipe to WelcomeBackdrop.tsx:
  // fewer dots on narrow viewports, random direction + duration per dot.
  function spawnParticles() {
    var root = document.getElementById('vty-particles');
    if (!root) return;
    root.innerHTML = '';
    var N = window.innerWidth < 640 ? 14 : 24;
    for (var i = 0; i < N; i++) {
      var s = document.createElement('span');
      s.style.left = (Math.random() * 100) + '%';
      s.style.top = (60 + Math.random() * 40) + '%';
      var size = 1.2 + Math.random() * 1.2;
      s.style.width = s.style.height = size + 'px';
      var dur = 22 + Math.random() * 28;
      s.style.animationDuration = dur + 's';
      s.style.animationDelay = (-Math.random() * dur) + 's';
      s.style.setProperty('--dx', (Math.random() * 30 - 15) + 'px');
      s.style.setProperty('--dy', -(60 + Math.random() * 50) + 'vh');
      root.appendChild(s);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', spawnParticles);
  } else {
    spawnParticles();
  }
})();
</script>
</body>
</html>
